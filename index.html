<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業抽查管理系統 - 獎懲建議表模組</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --sage-green: #606c38; --wood-green: #283618; --cream: #fefae0; --earth: #dda15e; --brown: #bc6c25; --soft-white: #ffffff; }
    body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--cream); color: var(--wood-green); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .main-wrapper { display: flex; gap: 30px; width: 100%; max-width: 1400px; align-items: flex-start; }
    
    .history-panel { width: 450px; background: var(--soft-white); padding: 25px; border-radius: 20px; border: 4px solid var(--earth); position: sticky; top: 20px; box-shadow: 8px 8px 0px var(--earth); }
    .history-panel h3 { margin-top: 0; font-size: 1.5rem; color: var(--brown); border-bottom: 3px solid var(--earth); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center;}
    .history-item { padding: 15px; margin-bottom: 15px; background: #fffdf5; border-radius: 12px; border-left: 8px solid var(--sage-green); border: 1px solid #eee; transition: 0.2s; }
    .history-item:hover { background: #f4f8ec; border-color: var(--sage-green); }
    .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    .link-btn { flex: 1; display: inline-block; color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1rem; text-align: center; box-sizing: border-box; }
    .link-btn:hover { opacity: 0.8; }
    .btn-batch-download { background: var(--sage-green); color: white; border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; width: 100%; border-radius: 12px; margin-top: 15px; cursor: pointer; box-shadow: 0 5px 10px rgba(96,108,56,0.2); }
    
    .container { flex: 1; background: var(--soft-white); padding: 45px; border-radius: 35px; box-shadow: 0 20px 60px rgba(96,108,56,0.12); border-top: 20px solid var(--sage-green); }
    h1 { color: var(--sage-green); text-align: center; margin-bottom: 45px; font-size: 2.8rem; letter-spacing: 2px; }
    .class-card { background: #fafaf7; border: 2px solid #eee; border-radius: 25px; padding: 35px; margin-bottom: 40px; position: relative; }
    .class-card h3 { font-size: 1.6rem; color: var(--sage-green); margin-top: 0; margin-bottom: 30px; border-left: 8px solid var(--earth); padding-left: 15px; }
    .remove-class { position: absolute; top: 25px; right: 25px; color: #ccc; cursor: pointer; font-size: 1.8rem; }
    .form-row { display: grid; grid-template-columns: 160px 240px 1fr; gap: 30px; margin-bottom: 40px; align-items: end; }
    label { display: block; font-weight: bold; font-size: 1.2rem; margin-bottom: 12px; color: var(--brown); }
    input, select { width: 100%; padding: 18px; border: 2px solid #ddd; border-radius: 15px; font-size: 1.2rem; background: white; box-sizing: border-box; }
    table { width: 100%; border-spacing: 0 15px; }
    th { text-align: left; padding: 10px; font-size: 1.1rem; color: #999; }
    td { background: white; padding: 18px; border-radius: 15px; border: 1px solid #f0f0f0; }
    .st-seat { width: 90px; text-align: center; font-weight: bold; font-size: 1.3rem; border: 2px solid #eee; border-radius: 10px; padding: 10px; }
    .name-td { width: 30%; } 
    .st-name { border: none; background: transparent; font-weight: 800; color: var(--wood-green); font-size: 1.3rem; width: 100%; }
    .penalty-td { width: 50%; } 
    .st-penalty { font-size: 1.25rem; width: 100%; cursor: pointer; }
    
    .btn-add-student { background: #f0f0f0; color: #555; border: none; padding: 15px 30px; font-size: 1.1rem; margin-top: 20px; border-radius: 18px; cursor: pointer; font-weight: bold;}
    .btn-add-class { background: var(--sage-green); color: white; border: none; width: 100%; padding: 22px; margin: 35px 0; font-size: 1.3rem; border-radius: 18px; cursor: pointer; font-weight: bold;}
    .btn-submit { background: var(--wood-green); color: white; border: none; width: 100%; font-size: 1.6rem; padding: 28px; box-shadow: 0 12px 25px rgba(40,54,24,0.35); border-radius: 18px; cursor: pointer; font-weight: bold;}
    .btn-reset { background: #e0e0e0; color: #333; border: none; width: 100%; font-size: 1.2rem; padding: 15px; margin-top: 15px; border-radius: 18px; cursor: pointer; font-weight: bold; display: none; }
    
    /* 🌟 優化載入動畫 */
    #loading { display: flex; flex-direction: column; align-items: center; margin-top: 35px; color: var(--sage-green); font-size: 1.4rem; font-weight: bold; }
    .spinner { width: 40px; height: 40px; border: 5px solid #d3dbb8; border-top: 5px solid var(--sage-green); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    #blockWarning { display:none; background-color: #ffe8e8; border: 2px solid #ff4d4d; color: #d32f2f; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; line-height: 1.5; font-size: 1rem;}
  </style>
</head>
<body>

  <h1>🌿 作業抽查管理系統 - 獎懲建議表模組</h1>

  <div class="main-wrapper">
    <div class="container">
      <div id="classContainer"></div>
      <button class="btn-add-class" id="btnAddClass" style="display:none;" onclick="addClassCard()">＋ 新增班級資料</button>
      <button class="btn-submit" id="finalSubmit" style="display:none;" onclick="submitAll()">🚀 一鍵產出各班獎懲表</button>
      <button class="btn-reset" id="resetBtn" onclick="resetForm()">✨ 清空並開啟新表單</button>
      
      <div id="loading">
        <div class="spinner" id="loadingSpinner"></div>
        <span id="loadingText">正在連線至後端資料庫，請稍候...</span>
      </div>
      <div id="globalStatus" style="display:none; margin-top:25px; text-align:center; font-weight:bold; font-size: 1.4rem; color: var(--sage-green);"></div>
    </div>

    <div class="history-panel">
      <h3>📜 系統產出紀錄 <button onclick="selectAllHistory()" style="font-size:0.9rem; padding:5px 10px; border-radius:5px; cursor:pointer; background:#eee; border:none;">全選</button></h3>
      <div id="historyList">讀取中...</div>
      <button class="btn-batch-download" onclick="batchDownloadPdfs()">🖨️ 批次下載打勾項目 (PDF)</button>
      
      <div id="blockWarning">
        ⚠️ <b>防擋指南</b>：<br>
        若被瀏覽器阻擋多重下載，請點擊網址列右側的「紅色叉叉視窗」圖示，選擇【一律允許】。
      </div>
    </div>
  </div>

  <audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg"></audio>

  <script>
    // =========================================================================
    // 🚨 警告：請務必將下方的 URL 替換為您的 GAS 網頁應用程式網址！ 🚨
    // =========================================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxv1_4kjhx42CpoQoLmVLEeryDGwgZD73qsbMV2J4MezUsw1dRrXE01JkZWYb0w8M28/exec'; 
    
    let studentDataMap = {};
    let cardCount = 0;

    window.onload = function() {
      // 防呆檢查：如果忘記換網址
      if (GAS_URL === 'YOUR_GAS_WEB_APP_URL' || GAS_URL === '') {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('loadingText').innerHTML = `<span style="color:red; font-size:1.6rem;">🚨 系統錯誤：未設定 API 網址！</span><br><br><span style="font-size:1rem; color:#333;">請用文字編輯器打開 index.html，找到第 141 行的 GAS_URL，<br>將其替換為您的 Google Apps Script 部署網址。</span>`;
        return;
      }

      fetch(`${GAS_URL}?action=initData`)
        .then(response => response.json())
        .then(res => {
          if (res.status === 'success') {
            studentDataMap = res.data.students;
            renderHistory(res.data.history);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('btnAddClass').style.display = 'block';
            document.getElementById('finalSubmit').style.display = 'block';
            addClassCard();
          } else {
            throw new Error(res.message);
          }
        })
        .catch(error => {
          document.getElementById('loadingSpinner').style.display = 'none';
          document.getElementById('loadingText').innerHTML = `<span style="color:red;">❌ API 連線失敗：<br>${error.message}<br>請檢查 GAS 網址是否正確，且權限需設為「所有人」。</span>`;
        });
    };

    function renderHistory(list) {
      const div = document.getElementById('historyList');
      if (list.length === 0) { div.innerHTML = '<p style="color:#ccc;text-align:center;">尚無紀錄</p>'; return; }
      
      div.innerHTML = list.map(h => {
        const match = h.url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        const pdfUrl = match ? `https://docs.google.com/spreadsheets/d/${match[1]}/export?format=pdf&size=A4&portrait=true&fitw=true&gridlines=false` : h.url;

        return `
        <div class="history-item">
          <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
            <input type="checkbox" class="history-cb" value="${pdfUrl}" style="width: 22px; height: 22px; cursor: pointer;">
            <span style="margin:0; font-size: 1.2rem; font-weight: bold; color: var(--wood-green);">📂 ${h.gradeClass}班 (${h.count}人)</span>
          </label>
          <span style="display:block; margin-left: 35px; margin-top: 5px; color:#888;">🕒 ${h.time}</span>
          
          <div class="btn-group">
             <a href="${pdfUrl}" target="_blank" class="link-btn" style="background: var(--sage-green);">📥 下載 PDF</a>
             <a href="${h.url}" target="_blank" class="link-btn" style="background: var(--earth);">📄 開啟試算表</a>
          </div>
        </div>
        `;
      }).join('');
    }

    function selectAllHistory() {
      const checkboxes = document.querySelectorAll('.history-cb');
      const allChecked = Array.from(checkboxes).every(cb => cb.checked);
      checkboxes.forEach(cb => cb.checked = !allChecked);
    }

    function batchDownloadPdfs() {
      const checkboxes = document.querySelectorAll('.history-cb:checked');
      if (checkboxes.length === 0) { alert('👉 請先勾選要下載的班級！'); return; }
      
      const btn = document.querySelector('.btn-batch-download');
      btn.innerText = '⏳ 正在連續下載...';
      btn.disabled = true;
      document.getElementById('blockWarning').style.display = 'block'; 

      let delay = 0;
      checkboxes.forEach((cb, index) => {
        setTimeout(() => {
          window.open(cb.value, '_blank');
          if (index === checkboxes.length - 1) {
            setTimeout(() => {
              btn.innerText = '🖨️ 批次下載打勾項目 (PDF)';
              btn.disabled = false;
            }, 2000);
          }
        }, delay);
        delay += 1000; 
      });
    }

    function addClassCard() {
      cardCount++;
      const container = document.getElementById('classContainer');
      const card = document.createElement('div');
      card.className = 'class-card';
      card.id = `card-${cardCount}`;
      const classOptions = Object.keys(studentDataMap).sort().map(c => `<option value="${c}">${c} 班</option>`).join('');
      const today = new Date().toISOString().split('T')[0];

      card.innerHTML = `
        <span class="remove-class" onclick="this.closest('.class-card').remove()">✕</span>
        <h3>[ 班級單位 #${cardCount} ]</h3>
        <div class="form-row">
          <div class="form-group"><label>班級</label><select class="sel-class">${classOptions}</select></div>
          <div class="form-group"><label>日期</label><input type="date" class="inp-date" value="${today}"></div>
          <div class="form-group"><label>事由</label><input type="text" class="inp-reason" value="寒假作業未繳交"></div>
        </div>
        <table>
          <thead><tr><th>座號</th><th>學生姓名</th><th>懲處種類</th></tr></thead>
          <tbody class="student-list"></tbody>
        </table>
        <button class="btn-add-student" onclick="addStudentRow('${card.id}')">＋ 增加本班學生</button>
      `;
      container.appendChild(card);
      addStudentRow(card.id);
    }

    function addStudentRow(cardId) {
      const tbody = document.querySelector(`#${cardId} .student-list`);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="number" class="st-seat" placeholder="00"></td>
        <td class="name-td"><input type="text" class="st-name" readonly value="等待輸入..."></td>
        <td class="penalty-td">
          <select class="st-penalty">
            <option value="警告乙支">警告乙支</option>
            <option value="警告兩支">警告兩支</option>
            <option value="小過乙支">小過乙支</option>
          </select>
        </td>
      `;
      tbody.appendChild(tr);

      const seatInp = tr.querySelector('.st-seat');
      seatInp.addEventListener('input', function() {
        const classId = document.querySelector(`#${cardId} .sel-class`).value;
        const nameInp = tr.querySelector('.st-name');
        if (studentDataMap[classId] && studentDataMap[classId][this.value]) {
          nameInp.value = studentDataMap[classId][this.value];
          tr.style.backgroundColor = '';
        } else {
          nameInp.value = '查無此人';
          tr.style.backgroundColor = '#fff0f0';
        }
      });
      seatInp.focus();
    }

    // 重置表單功能
    function resetForm() {
      document.getElementById('classContainer').innerHTML = '';
      document.getElementById('globalStatus').style.display = 'none';
      document.getElementById('finalSubmit').style.display = 'block';
      document.getElementById('btnAddClass').style.display = 'block';
      document.getElementById('resetBtn').style.display = 'none';
      cardCount = 0;
      addClassCard();
    }

    function submitAll() {
      const cards = document.querySelectorAll('.class-card');
      const allData = [];
      cards.forEach(card => {
        const students = [];
        card.querySelectorAll('.student-list tr').forEach(row => {
          const seat = row.querySelector('.st-seat').value;
          const name = row.querySelector('.st-name').value;
          if (seat && name !== '查無此人' && name !== '等待輸入...') {
            students.push({ seatNo: seat, name: name, penalty: row.querySelector('.st-penalty').value });
          }
        });
        if (students.length > 0) {
          allData.push({
            gradeClass: card.querySelector('.sel-class').value,
            date: card.querySelector('.inp-date').value,
            reason: card.querySelector('.inp-reason').value,
            students: students
          });
        }
      });

      if (allData.length === 0) { alert('請填寫有效的學生座號！'); return; }

      document.getElementById('finalSubmit').style.display = 'none';
      document.getElementById('btnAddClass').style.display = 'none';
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('loadingSpinner').style.display = 'block';
      document.getElementById('loadingText').innerText = 'API 傳輸中，正在為各班獨立建檔...';

      // 透過 Fetch API 傳送資料到後端
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(allData)
      })
      .then(response => response.json())
      .then(res => {
        if (res.status === 'success') {
          document.getElementById('successSound').play();
          document.getElementById('loading').style.display = 'none';
          document.getElementById('globalStatus').style.display = 'block';
          document.getElementById('globalStatus').innerText = '✅ API 處理完成！請在右側下載 PDF！';
          document.getElementById('resetBtn').style.display = 'block'; // 顯示重置按鈕
          
          // 重新抓取歷史紀錄更新面板
          fetch(`${GAS_URL}?action=initData`)
            .then(r => r.json())
            .then(data => renderHistory(data.data.history));
            
          document.getElementById('classContainer').innerHTML = '';
          addClassCard();
        } else {
          throw new Error(res.message);
        }
      })
      .catch(error => {
        alert("❌ API 產出發生錯誤：\n" + error.message);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('finalSubmit').style.display = 'block';
        document.getElementById('btnAddClass').style.display = 'block';
      });
    }
  </script>
</body>
</html>
