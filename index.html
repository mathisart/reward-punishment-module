<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業抽查管理系統 - 全域智慧解析模組 v1.5.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* 延續森林系配色 */
    :root { --sage-green: #606c38; --wood-green: #283618; --cream: #fefae0; --earth: #dda15e; --brown: #bc6c25; --soft-white: #ffffff; }
    body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--cream); color: var(--wood-green); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .main-wrapper { display: flex; gap: 30px; width: 100%; max-width: 1400px; align-items: flex-start; }
    
    .container { flex: 1; background: var(--soft-white); padding: 45px; border-radius: 35px; box-shadow: 0 20px 60px rgba(96,108,56,0.12); border-top: 20px solid var(--sage-green); }
    h1 { color: var(--sage-green); text-align: center; margin-bottom: 25px; font-size: 2.8rem; letter-spacing: 2px; }
    
    /* 頂部控制區 */
    .top-controls { display: flex; gap: 15px; margin-bottom: 40px; background: #f4f8ec; padding: 20px; border-radius: 20px; border: 2px dashed var(--sage-green); }
    
    .class-card { background: #fafaf7; border: 2px solid #eee; border-radius: 25px; padding: 35px; margin-bottom: 40px; position: relative; transition: 0.3s; }
    .class-card:hover { border-color: var(--earth); }
    
    /* 歷史面板 */
    .history-panel { width: 400px; background: var(--soft-white); padding: 25px; border-radius: 20px; border: 4px solid var(--earth); position: sticky; top: 20px; box-shadow: 8px 8px 0px var(--earth); }
    .history-item { padding: 12px; margin-bottom: 10px; background: #fffdf5; border-radius: 10px; border: 1px solid #eee; font-size: 0.95rem; }

    /* 表格與輸入 */
    table { width: 100%; border-spacing: 0 10px; margin-top: 15px; }
    td { background: white; padding: 12px; border-radius: 12px; border: 1px solid #f0f0f0; }
    input, select { padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
    .st-seat { width: 60px; text-align: center; font-weight: bold; }
    .st-name { border: none; font-weight: bold; color: var(--wood-green); width: 100px; background: transparent; }

    /* 按鈕組 */
    .btn-action { padding: 15px 25px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1.1rem; flex: 1; }
    .btn-add { background: #f0f0f0; color: #666; }
    .btn-batch { background: var(--earth); color: white; box-shadow: 0 4px 10px rgba(221,161,94,0.3); }
    .btn-submit { background: var(--sage-green); color: white; width: 100%; font-size: 1.5rem; padding: 20px; margin-top: 20px; box-shadow: 0 4px 15px rgba(96,108,56,0.4); }
    .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }

    /* 批次輸入彈窗 (Modal) */
    #batchModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 35px; border-radius: 25px; width: 600px; max-width: 90%; }
    textarea { width: 100%; height: 250px; margin: 15px 0; padding: 15px; border: 2px solid #ddd; border-radius: 15px; font-size: 1.1rem; box-sizing: border-box; font-family: monospace; }
    
    #loading { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
    .spinner { width: 30px; height: 30px; border: 4px solid #eee; border-top: 4px solid var(--sage-green); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div style="background:var(--wood-green); color:white; padding:5px 20px; border-radius:20px; margin-bottom:15px; font-size:0.9rem;">Version 1.5.0 - 全域自動分班版</div>
  <h1>🌿 作業抽查管理系統</h1>

  <div class="main-wrapper">
    <div class="container">
      
      <div class="top-controls" id="topControls" style="display:none;">
        <button class="btn-action btn-batch" onclick="openGlobalBatchModal()">📋 貼上試算表 (自動分班)</button>
        <button class="btn-action btn-add" onclick="addClassCard()">＋ 手動新增班級</button>
      </div>

      <div id="classContainer"></div>
      
      <button class="btn-action btn-submit" id="finalSubmit" style="display:none;" onclick="submitAll()">💾 儲存並產出所有班級 PDF</button>
      
      <div id="loading">
        <div class="spinner" id="loadingSpinner"></div>
        <span id="loadingText">連線中...</span>
      </div>
    </div>

    <div class="history-panel">
      <h3>📜 產出紀錄回顧</h3>
      <div id="historyList">讀取中...</div>
    </div>
  </div>

  <div id="batchModal">
    <div class="modal-content">
      <h3 style="margin-top:0; color:var(--brown);">🚀 跨班級智慧解析</h3>
      <p style="font-size:0.95rem; color:#666; line-height:1.5;">
        請直接貼上包含多個班級的 Excel 清單：<br>
        1. 系統會擷取前 3 碼作為「班級」(如 710)。<br>
        2. 系統會擷取後 2 碼作為「座號」(如 25)。<br>
        3. 系統將自動為您建立該班級的區塊並填入資料！
      </p>
      <textarea id="batchInput" placeholder="貼上範例：&#10;71025 黃乙珊&#10;71028 吳宥婕&#10;71105 劉子洋 2&#10;71201 王宏凱"></textarea>
      <div style="display:flex; gap:10px;">
        <button class="btn-action btn-batch" style="flex:2;" onclick="processGlobalBatch()">✨ 開始智慧分班</button>
        <button class="btn-action btn-add" style="flex:1;" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg"></audio>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxv1_4kjhx42CpoQoLmVLEeryDGwgZD73qsbMV2J4MezUsw1dRrXE01JkZWYb0w8M28/exec'; 
    
    let studentDataMap = {};
    let cardCount = 0;

    window.onload = function() {
      fetch(`${GAS_URL}?action=initData`)
        .then(res => res.json())
        .then(res => {
          studentDataMap = res.data.students;
          renderHistory(res.data.history);
          document.getElementById('loading').style.display = 'none';
          document.getElementById('topControls').style.display = 'flex';
          document.getElementById('finalSubmit').style.display = 'block';
        });
    };

    // 參數 targetClass 允許我們在建立卡片時，直接指定它是哪一班
    function addClassCard(targetClass = null) {
      cardCount++;
      const container = document.getElementById('classContainer');
      const card = document.createElement('div');
      card.className = 'class-card';
      const cardId = `card-${cardCount}`;
      card.id = cardId;
      
      const classOptions = Object.keys(studentDataMap).sort().map(c => {
        const isSelected = (c === targetClass) ? 'selected' : '';
        return `<option value="${c}" ${isSelected}>${c} 班</option>`;
      }).join('');
      
      card.innerHTML = `
        <span style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:1.5rem; color:#ccc;" onclick="this.closest('.class-card').remove()">✕</span>
        <h3 style="margin-top:0; color:var(--sage-green);">[ 班級單位 ]</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr 2fr; gap:15px;">
          <div><label>班級</label><select class="sel-class" style="width:100%">${classOptions}</select></div>
          <div><label>日期</label><input type="date" class="inp-date" value="${new Date().toISOString().split('T')[0]}" style="width:100%"></div>
          <div><label>事由</label><input type="text" class="inp-reason" value="作業未繳交" style="width:100%"></div>
        </div>
        <table>
          <thead><tr><th>座號</th><th>姓名</th><th>警告支數</th><th>操作</th></tr></thead>
          <tbody class="student-list"></tbody>
        </table>
        <button class="btn-action btn-add" style="margin-top:15px; width:100%; padding:10px;" onclick="addStudentRow('${cardId}')">＋ 手動新增單筆學生</button>
      `;
      container.appendChild(card);
      return cardId;
    }

    function addStudentRow(cardId, seat = '', count = 1) {
      const tbody = document.querySelector(`#${cardId} .student-list`);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="number" class="st-seat" value="${seat}" placeholder="00"></td>
        <td><input type="text" class="st-name" readonly value="等待..."></td>
        <td><input type="number" class="st-warn-input" value="${count}" min="1" style="width:60px;"> 支</td>
        <td><button tabindex="-1" onclick="this.closest('tr').remove()" style="border:none; background:none; color:red; cursor:pointer; font-size:1.2rem;">✕</button></td>
      `;
      tbody.appendChild(tr);

      const seatInp = tr.querySelector('.st-seat');
      const update = () => {
        const classId = document.querySelector(`#${cardId} .sel-class`).value;
        const nameInp = tr.querySelector('.st-name');
        if (studentDataMap[classId] && studentDataMap[classId][seatInp.value]) {
          nameInp.value = studentDataMap[classId][seatInp.value];
          tr.style.opacity = "1";
        } else {
          nameInp.value = "查無此人";
          tr.style.opacity = "0.5";
        }
      };

      seatInp.addEventListener('input', update);
      // 如果班級下拉選單改變，也重新驗證這行
      document.querySelector(`#${cardId} .sel-class`).addEventListener('change', update);
      
      if(seat) update(); 
    }

    // --- 🌟 全域智慧分班核心邏輯 ---
    function openGlobalBatchModal() {
      document.getElementById('batchModal').style.display = 'flex';
      document.getElementById('batchInput').value = '';
      document.getElementById('batchInput').focus();
    }

    function closeModal() {
      document.getElementById('batchModal').style.display = 'none';
    }

    function processGlobalBatch() {
      const rawText = document.getElementById('batchInput').value.trim();
      if (!rawText) return;

      const lines = rawText.split('\n');
      let successCount = 0;
      let groupedData = {}; // 用來存放分班結果，例如: { "710": [{seat:"25", count:1}], "711": [...] }

      // 1. 拆解並將資料分組
      lines.forEach(line => {
        const parts = line.split(/[\s\t]+/).filter(p => p.trim() !== "");
        if (parts.length === 0) return;

        let rawId = parts[0]; 
        
        // 必須是 5 位數才能判斷班級 (例如 71025)
        if (rawId.length === 5 && !isNaN(rawId)) {
          const classStr = rawId.substring(0, 3); // "710"
          const seatStr = parseInt(rawId.substring(3, 5), 10).toString(); // "25" (去掉開頭的0)

          // 尋找警告支數 (找數字)
          let warnCount = 1;
          for (let i = 1; i < parts.length; i++) {
            if (!isNaN(parts[i]) && parts[i] !== "") {
              warnCount = parseInt(parts[i], 10);
              break; 
            }
          }

          if (!groupedData[classStr]) groupedData[classStr] = [];
          groupedData[classStr].push({ seat: seatStr, count: warnCount });
          successCount++;
        }
      });

      // 2. 根據分組結果，自動建立卡片並填入資料
      for (const [classId, students] of Object.entries(groupedData)) {
        // 防呆：確認資料庫裡真的有這個班級
        if (!studentDataMap[classId]) continue; 

        // 檢查畫面上是不是已經有這個班級的卡片了？
        let targetCardId = null;
        const existingCards = document.querySelectorAll('.class-card');
        existingCards.forEach(card => {
          const selectVal = card.querySelector('.sel-class').value;
          if (selectVal === classId) {
            targetCardId = card.id;
          }
        });

        // 如果沒有，就自動建一張，並指定班級
        if (!targetCardId) {
          targetCardId = addClassCard(classId);
        }

        // 把學生資料倒進該卡片
        students.forEach(st => {
          addStudentRow(targetCardId, st.seat, st.count);
        });
      }

      alert(`✅ 智慧分班完成！共解析並匯入 ${successCount} 筆資料。`);
      closeModal();
    }

    // --- 提交與紀錄功能 ---
    function submitAll() {
      const cards = document.querySelectorAll('.class-card');
      const allData = [];
      cards.forEach(card => {
        const students = [];
        card.querySelectorAll('.student-list tr').forEach(row => {
          const seat = row.querySelector('.st-seat').value;
          const name = row.querySelector('.st-name').value;
          const count = row.querySelector('.st-warn-input').value;
          if (seat && name !== '查無此人') {
            students.push({ seatNo: seat, name: name, penalty: `警告共 ${count} 支` });
          }
        });
        if (students.length > 0) {
          allData.push({
            gradeClass: card.querySelector('.sel-class').value,
            date: card.querySelector('.inp-date').value,
            reason: card.querySelector('.inp-reason').value,
            students: students
          });
        }
      });

      if (allData.length === 0) { alert('清單是空的喔！請先匯入資料。'); return; }

      document.getElementById('loading').style.display = 'flex';
      document.getElementById('finalSubmit').innerText = '⏳ PDF 產出中，請稍候...';
      
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(allData)
      })
      .then(res => res.json())
      .then(res => {
        if (res.status === 'success') {
          document.getElementById('successSound').play();
          alert('✅ 所有班級獎懲建議表已成功產出！');
          location.reload();
        }
      });
    }

    function renderHistory(list) {
      const div = document.getElementById('historyList');
      if (!list || list.length === 0) { div.innerHTML = '<p>尚未有歷史紀錄</p>'; return; }
      div.innerHTML = list.map(h => `
        <div class="history-item">
          <strong>${h.gradeClass} 班</strong> (${h.count}人)<br>
          <small style="color:#999;">${h.time}</small><br>
          <a href="${h.url}" target="_blank" style="color:var(--sage-green); font-weight:bold; font-size:0.9rem;">查看檔案 ↗</a>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
