<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業抽查管理系統 - 歷史紀錄分頁版 v2.4.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --sage-green: #606c38; --wood-green: #283618; --cream: #fefae0; --earth: #dda15e; --brown: #bc6c25; --soft-white: #ffffff; }
    body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--cream); color: var(--wood-green); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .main-wrapper { display: flex; gap: 30px; width: 100%; max-width: 1400px; align-items: flex-start; }
    
    .container { flex: 1; background: var(--soft-white); padding: 45px; border-radius: 35px; box-shadow: 0 20px 60px rgba(96,108,56,0.12); border-top: 20px solid var(--sage-green); }
    h1 { color: var(--sage-green); text-align: center; margin-bottom: 25px; font-size: 2.8rem; letter-spacing: 2px; }
    
    .top-controls { display: flex; gap: 15px; margin-bottom: 20px; background: #f4f8ec; padding: 20px; border-radius: 20px; border: 2px dashed var(--sage-green); }
    
    .global-settings { background: #fff; border: 2px solid var(--earth); border-radius: 20px; padding: 25px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(221,161,94,0.1); position: relative; }
    .sync-toggle { position: absolute; top: 25px; right: 25px; background: var(--cream); padding: 8px 15px; border-radius: 12px; border: 2px solid var(--sage-green); font-weight: bold; cursor: pointer; color: var(--wood-green); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .sync-toggle:hover { background: #e9edc9; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 15px; margin-bottom: 15px; }
    .form-group { display: flex; flex-direction: column; }
    label { font-weight: bold; margin-bottom: 5px; font-size: 0.95rem; color: var(--brown); }

    .class-card { background: #fafaf7; border: 2px solid #eee; border-radius: 25px; padding: 25px; margin-bottom: 30px; position: relative; transition: 0.3s; }
    .class-card:hover { border-color: var(--sage-green); }
    .card-settings { background: #fff; border: 1px dashed #ccc; border-radius: 15px; padding: 15px; margin-bottom: 15px; }

    /* 歷史面板樣式 */
    .history-panel { width: 420px; background: var(--soft-white); padding: 25px; border-radius: 20px; border: 4px solid var(--earth); position: sticky; top: 20px; box-shadow: 8px 8px 0px var(--earth); max-height: 85vh; display: flex; flex-direction: column;}
    .history-panel h3 { margin-top: 0; font-size: 1.5rem; color: var(--brown); border-bottom: 3px solid var(--earth); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;}
    #historyList { overflow-y: auto; flex: 1; padding-right: 5px; margin-top: 10px; }
    #historyList::-webkit-scrollbar { width: 6px; }
    #historyList::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    
    .history-item { padding: 12px; margin-bottom: 10px; background: #fffdf5; border-radius: 10px; border-left: 6px solid var(--sage-green); border: 1px solid #eee; font-size: 1rem; }
    
    /* 🌟 新增：分頁控制列樣式 */
    .pagination-controls { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; margin-top: 10px; border-top: 1px dashed #ccc; font-size: 0.9rem; font-weight: bold; color: var(--wood-green); flex-shrink: 0;}
    .page-btn { background: var(--earth); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .page-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .page-btn:disabled { background: #ddd; color: #888; cursor: not-allowed; }

    .btn-batch-download { background: var(--sage-green); color: white; border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; width: 100%; border-radius: 12px; margin-top: 15px; cursor: pointer; box-shadow: 0 5px 10px rgba(96,108,56,0.2); flex-shrink: 0;}

    table { width: 100%; border-spacing: 0 8px; margin-top: 10px; }
    td { background: white; padding: 10px; border-radius: 10px; border: 1px solid #f0f0f0; }
    input, select { padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; background: white; font-family: inherit; }
    .st-seat { width: 60px; text-align: center; font-weight: bold; }
    .st-name { border: none; font-weight: bold; color: var(--wood-green); width: 100px; background: transparent; }

    .btn-action { padding: 15px 25px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1.1rem; flex: 1; }
    .btn-add { background: #f0f0f0; color: #666; }
    .btn-batch { background: var(--earth); color: white; }
    .btn-submit { background: var(--sage-green); color: white; width: 100%; font-size: 1.5rem; padding: 20px; margin-top: 20px; }
    .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-submit:disabled { background: #999; cursor: not-allowed; transform: none; box-shadow: none; }

    #batchModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 35px; border-radius: 25px; width: 600px; max-width: 90%; }
    textarea { width: 100%; height: 250px; margin: 15px 0; padding: 15px; border: 2px solid #ddd; border-radius: 15px; font-size: 1.1rem; box-sizing: border-box; }
    
    #loading { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
    .spinner { width: 30px; height: 30px; border: 4px solid #eee; border-top: 4px solid var(--sage-green); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div style="background:var(--brown); color:white; padding:5px 20px; border-radius:20px; margin-bottom:15px; font-size:0.9rem;">Version 2.4.0 - 歷史紀錄分頁版</div>
  <h1>🌿 作業抽查管理系統</h1>

  <div class="main-wrapper">
    <div class="container">
      
      <div class="top-controls" id="topControls" style="display:none;">
        <button class="btn-action btn-batch" onclick="openGlobalBatchModal()">📋 貼上未交名單 (自動分班累加)</button>
        <button class="btn-action btn-add" onclick="addClassCard()">＋ 手動新增單一班級</button>
      </div>

      <div class="global-settings" id="globalSettings" style="display:none;">
        <label class="sync-toggle">
          <input type="checkbox" id="syncGlobal" checked onchange="toggleSync()" style="width:18px; height:18px;"> 🔗 同步套用至所有班級
        </label>
        <h3 style="margin-top:0; color:var(--sage-green); border-bottom: 2px solid #eee; padding-bottom: 10px; width: 70%;">📝 預設表單設定</h3>
        
        <div class="form-grid">
          <div class="form-group"><label>填表日期</label><input type="date" id="globalDate"></div>
          <div class="form-group"><label>學年度</label><input type="number" id="globalYear"></div>
          <div class="form-group">
            <label>抽查類別</label>
            <select id="globalType">
              <option value="第一次作業抽查">第一次作業抽查</option>
              <option value="第二次作業抽查">第二次作業抽查</option>
              <option value="寒假作業抽查">寒假作業抽查</option>
              <option value="暑假作業抽查">暑假作業抽查</option>
              <option value="其他">其他類別</option>
            </select>
          </div>
        </div>
        <div class="form-grid" style="grid-template-columns: 1fr 1.5fr;">
          <div class="form-group">
            <label>作業標題 (如：國文習作)</label>
            <input type="text" id="globalTitle" placeholder="在此輸入科目或標題" value="一般作業">
          </div>
          <div class="form-group">
            <label>事由後綴 (自動組合)</label>
            <input type="text" id="globalSuffix" value="未依規定期限完成並繳交" style="color:#666; background:#f9f9f9;">
          </div>
        </div>
      </div>

      <div id="classContainer"></div>
      
      <button class="btn-action btn-submit" id="finalSubmit" style="display:none;" onclick="submitAll()">💾 儲存並產出所有正式獎懲表</button>
      
      <div id="loading">
        <div class="spinner" id="loadingSpinner"></div>
        <span id="loadingText">系統連線中...</span>
      </div>
    </div>

    <div class="history-panel">
      <h3>
        📜 產出紀錄
        <button onclick="selectAllHistory()" style="font-size:0.8rem; padding:6px 12px; border-radius:8px; cursor:pointer; background:#eee; border:none; font-weight:bold; color:var(--wood-green);">全選本頁</button>
      </h3>
      <div id="historyList">讀取中...</div>
      
      <div class="pagination-controls" id="paginationControls" style="display:none;">
        <button class="page-btn" id="prevPageBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageIndicator">1 / 1 頁</span>
        <button class="page-btn" id="nextPageBtn" onclick="changePage(1)">下一頁 ▶</button>
      </div>

      <button class="btn-batch-download" onclick="batchDownloadPdfs()">🖨️ 批次下載打勾的 PDF</button>
    </div>
  </div>

  <div id="batchModal">
    <div class="modal-content">
      <h3 style="margin-top:0; color:var(--brown);">🚀 跨班級智慧解析</h3>
      <textarea id="batchInput" placeholder="直接貼上試算表內容：&#10;71025 黃乙珊&#10;71025 黃乙珊&#10;71105 劉子洋 2"></textarea>
      <div style="display:flex; gap:10px;">
        <button class="btn-action btn-batch" style="flex:2;" onclick="processGlobalBatch()">✨ 開始智慧分班與累加</button>
        <button class="btn-action btn-add" style="flex:1;" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg"></audio>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxv1_4kjhx42CpoQoLmVLEeryDGwgZD73qsbMV2J4MezUsw1dRrXE01JkZWYb0w8M28/exec'; 
    
    let studentDataMap = {};
    let cardCount = 0;

    // 🌟 分頁全域變數
    let fullHistoryData = []; 
    let currentPage = 1;
    const itemsPerPage = 10; // 每頁顯示 10 筆

    window.onload = function() {
      fetch(`${GAS_URL}?action=initData&t=${new Date().getTime()}`)
        .then(res => res.json())
        .then(res => {
          studentDataMap = res.data.students;
          // 初始化分頁資料
          fullHistoryData = res.data.history || [];
          renderHistoryPage(); 

          document.getElementById('loading').style.display = 'none';
          document.getElementById('topControls').style.display = 'flex';
          document.getElementById('globalSettings').style.display = 'block';
          document.getElementById('finalSubmit').style.display = 'block';

          document.getElementById('globalDate').value = new Date().toISOString().split('T')[0];
          document.getElementById('globalYear').value = new Date().getFullYear() - 1911;
        });
    };

    function toggleSync() {
      const isSync = document.getElementById('syncGlobal').checked;
      const allCardSettings = document.querySelectorAll('.card-settings');
      
      allCardSettings.forEach(settingDiv => {
        settingDiv.style.display = isSync ? 'none' : 'block';
        if (!isSync) {
          settingDiv.querySelector('.inp-date').value = document.getElementById('globalDate').value;
          settingDiv.querySelector('.inp-year').value = document.getElementById('globalYear').value;
          settingDiv.querySelector('.sel-type').value = document.getElementById('globalType').value;
          settingDiv.querySelector('.inp-title').value = document.getElementById('globalTitle').value;
          settingDiv.querySelector('.inp-suffix').value = document.getElementById('globalSuffix').value;
        }
      });
    }

    function addClassCard(targetClass = null) {
      cardCount++;
      const container = document.getElementById('classContainer');
      const card = document.createElement('div');
      card.className = 'class-card';
      const cardId = `card-${cardCount}`;
      card.id = cardId;
      
      const classOptions = Object.keys(studentDataMap).sort().map(c => {
        const isSelected = (c === targetClass) ? 'selected' : '';
        return `<option value="${c}" ${isSelected}>${c} 班</option>`;
      }).join('');
      
      const isSync = document.getElementById('syncGlobal').checked;
      const displayStyle = isSync ? 'none' : 'block';

      card.innerHTML = `
        <span style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:1.5rem; color:#ccc;" onclick="this.closest('.class-card').remove()">✕</span>
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
          <h3 style="margin:0; color:var(--sage-green);">📂 班級：</h3>
          <select class="sel-class" style="width:200px; font-weight:bold; font-size:1.1rem; color:var(--wood-green); border-color:var(--sage-green);">${classOptions}</select>
        </div>
        
        <div class="card-settings" style="display: ${displayStyle};">
          <div class="form-grid" style="margin-bottom:10px;">
            <div class="form-group"><label>填表日期</label><input type="date" class="inp-date"></div>
            <div class="form-group"><label>學年度</label><input type="number" class="inp-year"></div>
            <div class="form-group">
              <label>抽查類別</label>
              <select class="sel-type">
                <option value="第一次作業抽查">第一次作業抽查</option>
                <option value="第二次作業抽查">第二次作業抽查</option>
                <option value="寒假作業抽查">寒假作業抽查</option>
                <option value="暑假作業抽查">暑假作業抽查</option>
                <option value="其他">其他類別</option>
              </select>
            </div>
          </div>
          <div class="form-grid" style="grid-template-columns: 1fr 1.5fr; margin-bottom:0;">
            <div class="form-group"><label>作業標題</label><input type="text" class="inp-title"></div>
            <div class="form-group"><label>事由後綴</label><input type="text" class="inp-suffix"></div>
          </div>
        </div>

        <table>
          <thead><tr><th>座號</th><th>姓名</th><th>警告累計</th><th>操作</th></tr></thead>
          <tbody class="student-list"></tbody>
        </table>
        <button class="btn-action btn-add" style="margin-top:10px; width:100%; padding:8px;" onclick="addStudentRow('${cardId}')">＋ 單筆新增學生</button>
      `;
      container.appendChild(card);
      if (!isSync) toggleSync(); 
      return cardId;
    }

    function addStudentRow(cardId, seat = '', count = 1) {
      const tbody = document.querySelector(`#${cardId} .student-list`);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="number" class="st-seat" value="${seat}"></td>
        <td><input type="text" class="st-name" readonly value="等待..."></td>
        <td><input type="number" class="st-warn-input" value="${count}" min="1" style="width:60px;"> 支</td>
        <td><button tabindex="-1" onclick="this.closest('tr').remove()" style="border:none; background:none; color:red; cursor:pointer; font-size:1.2rem;">✕</button></td>
      `;
      tbody.appendChild(tr);
      const seatInp = tr.querySelector('.st-seat');
      const update = () => {
        const classId = document.querySelector(`#${cardId} .sel-class`).value;
        const nameInp = tr.querySelector('.st-name');
        if (studentDataMap[classId] && studentDataMap[classId][seatInp.value]) {
          nameInp.value = studentDataMap[classId][seatInp.value];
          tr.style.opacity = "1";
        } else {
          nameInp.value = "查無此人";
          tr.style.opacity = "0.5";
        }
      };
      seatInp.addEventListener('input', update);
      document.querySelector(`#${cardId} .sel-class`).addEventListener('change', update);
      if(seat) update(); 
    }

    function processGlobalBatch() {
      const rawText = document.getElementById('batchInput').value.trim();
      if (!rawText) return;
      const lines = rawText.split('\n');
      let groupedData = {}; 
      lines.forEach(line => {
        const parts = line.split(/[\s\t]+/).filter(p => p.trim() !== "");
        if (parts.length >= 1 && parts[0].length === 5 && !isNaN(parts[0])) {
          const cls = parts[0].substring(0, 3);
          const seat = parseInt(parts[0].substring(3), 10).toString();
          let count = 1;
          for (let i = 1; i < parts.length; i++) { if (!isNaN(parts[i])) { count = parseInt(parts[i]); break; } }
          if (!groupedData[cls]) groupedData[cls] = {};
          groupedData[cls][seat] = (groupedData[cls][seat] || 0) + count;
        }
      });
      for (const [cls, seats] of Object.entries(groupedData)) {
        if (!studentDataMap[cls]) continue;
        let cardId = null;
        document.querySelectorAll('.class-card').forEach(c => { if(c.querySelector('.sel-class').value === cls) cardId = c.id; });
        if (!cardId) cardId = addClassCard(cls);
        for (const [seat, count] of Object.entries(seats)) { addStudentRow(cardId, seat, count); }
      }
      closeModal();
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function submitAll() {
      const isSync = document.getElementById('syncGlobal').checked;
      const cards = document.querySelectorAll('.class-card');
      const allData = [];
      
      cards.forEach(card => {
        let cYear, cDate, cType, cTitle, cSuffix;
        if (isSync) {
          cYear = document.getElementById('globalYear').value;
          cDate = document.getElementById('globalDate').value;
          cType = document.getElementById('globalType').value;
          cTitle = document.getElementById('globalTitle').value;
          cSuffix = document.getElementById('globalSuffix').value;
        } else {
          cYear = card.querySelector('.inp-year').value;
          cDate = card.querySelector('.inp-date').value;
          cType = card.querySelector('.sel-type').value;
          cTitle = card.querySelector('.inp-title').value;
          cSuffix = card.querySelector('.inp-suffix').value;
        }

        const fullReason = `${cTitle}${cSuffix}`;
        const finalBackendString = `${cYear}學年度 ${cType} (${fullReason})`;

        const students = [];
        card.querySelectorAll('.student-list tr').forEach(row => {
          const seat = row.querySelector('.st-seat').value;
          const name = row.querySelector('.st-name').value;
          const count = row.querySelector('.st-warn-input').value;
          if (seat && name !== '查無此人' && name !== '等待...') {
            students.push({ seatNo: seat, name: name, penalty: `警告共 ${count} 支` });
          }
        });

        if (students.length > 0) {
          allData.push({
            gradeClass: card.querySelector('.sel-class').value,
            date: cDate,               
            reason: finalBackendString, 
            students: students
          });
        }
      });

      if (allData.length === 0) return alert('清單是空的喔！請先確認有成功匯入且有對應到正確姓名。');
      
      document.getElementById('loading').style.display = 'flex';
      const submitBtn = document.getElementById('finalSubmit');
      submitBtn.disabled = true;
      let successCount = 0;

      for (let i = 0; i < allData.length; i++) {
        submitBtn.innerText = `⏳ 產出中：${allData[i].gradeClass}班 (${i + 1}/${allData.length})...`;
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify([allData[i]])
          });
          const resJson = await res.json();
          if(resJson.status === 'success') {
            successCount++;
          }
        } catch (err) {
          console.error(`❌ ${allData[i].gradeClass}班 處理失敗`, err);
        }
        if (i < allData.length - 1) await sleep(1500); 
      }

      document.getElementById('successSound').play();
      submitBtn.innerText = `✅ 完成！成功產出 ${successCount} 個班級的獎懲表`;
      setTimeout(() => { location.reload(); }, 2000);
    }

    // 🌟 核心升級：分頁渲染邏輯
    function renderHistoryPage() {
      const div = document.getElementById('historyList');
      const pagination = document.getElementById('paginationControls');

      if (fullHistoryData.length === 0) {
        div.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">尚未有歷史紀錄</p>';
        pagination.style.display = 'none';
        return;
      }

      // 計算總頁數與安全邊界
      const totalPages = Math.ceil(fullHistoryData.length / itemsPerPage);
      if (currentPage < 1) currentPage = 1;
      if (currentPage > totalPages) currentPage = totalPages;

      // 切割出當前頁要顯示的資料
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const pageData = fullHistoryData.slice(startIndex, endIndex);

      // 渲染畫面
      div.innerHTML = pageData.map(h => {
        const match = h.url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        const pdfUrl = match ? `https://docs.google.com/spreadsheets/d/${match[1]}/export?format=pdf&size=A4&portrait=false&fitw=true&gridlines=false&top_margin=0.2&bottom_margin=0.2&left_margin=0.2&right_margin=0.2` : h.url;
        return `
        <div class="history-item">
          <label style="display: flex; align-items: center; gap: 8px; cursor:pointer;">
            <input type="checkbox" class="history-cb" value="${pdfUrl}" style="width:18px; height:18px; cursor:pointer;">
            <strong>${h.gradeClass}班</strong> (${h.count}人)
          </label>
          <div style="font-size:0.85rem; color:#888; margin-left:26px; margin-top:5px;">
            ${h.time}<br>
            <a href="${h.url}" target="_blank" style="color:var(--sage-green); font-weight:bold; text-decoration:none;">[查看原始試算表]</a>
          </div>
        </div>
        `;
      }).join('');

      // 更新分頁按鈕狀態
      pagination.style.display = 'flex';
      document.getElementById('pageIndicator').innerText = `第 ${currentPage} / ${totalPages} 頁 (共 ${fullHistoryData.length} 筆)`;
      document.getElementById('prevPageBtn').disabled = (currentPage === 1);
      document.getElementById('nextPageBtn').disabled = (currentPage === totalPages);
    }

    function changePage(delta) {
      currentPage += delta;
      renderHistoryPage();
      // 切換頁面後，將捲軸滾回頂部
      document.getElementById('historyList').scrollTop = 0;
    }

    // 🌟 全選邏輯改為「只全選當前頁面看得見的項目」
    function selectAllHistory() {
      const cbs = document.querySelectorAll('.history-cb');
      const all = Array.from(cbs).every(c => c.checked);
      cbs.forEach(c => c.checked = !all);
    }

    function batchDownloadPdfs() {
      const cbs = document.querySelectorAll('.history-cb:checked');
      if (cbs.length === 0) return alert('👉 請先勾選要下載的班級！');
      
      const btn = document.querySelector('.btn-batch-download');
      btn.innerText = `⏳ 正在連續下載 ${cbs.length} 個檔案...`;
      btn.disabled = true;

      let delay = 0;
      cbs.forEach((cb, index) => {
        setTimeout(() => {
          window.open(cb.value, '_blank');
          if (index === cbs.length - 1) {
            setTimeout(() => {
              btn.innerText = '🖨️ 批次下載打勾的 PDF';
              btn.disabled = false;
            }, 2000);
          }
        }, delay);
        delay += 1000; 
      });
    }

    function closeModal() { document.getElementById('batchModal').style.display = 'none'; }
    function openGlobalBatchModal() { document.getElementById('batchModal').style.display = 'flex'; document.getElementById('batchInput').value=''; document.getElementById('batchInput').focus(); }
  </script>
</body>
</html>
